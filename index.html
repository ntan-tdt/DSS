<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #5B86E5, #36D1DC); /* Blue and Purple Gradient */
            background-image: url('backgr_02.png');
            background-size: cover;
            color: white;
        }
        .logo {
            display: block;
            margin: 50px auto;
            width: 200px;
        }
        .menu {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }
        .menu button {
            background-color: transparent;
            border: 2px solid #fff;
            color: #fff;
            border-radius: 5px;
            padding: 10px 20px;
            margin: 0 10px;
            transition: all 0.3s ease;
        }
        .menu button:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>

    <img src="logo_VHU.png" alt="VHU Logo" class="logo">
    <div class="menu">
        <button onclick="location.href='Chuong_01.html'">Chương 01</button>
        <button onclick="location.href='Chuong_02.html'">Chương 02</button>

    </footer>
